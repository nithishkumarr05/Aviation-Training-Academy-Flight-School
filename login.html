<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height, viewport-fit=cover">
    <title>Sign In · SkyWings Aviation Academy</title>
    <!-- Custom Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='75' font-size='75' text-anchor='middle'%3E✈️%3C/text%3E%3C/svg%3E">
    <meta name="description" content="Sign in to your SkyWings Aviation Academy account. Access your flight training progress, schedule, and pilot dashboard.">

    <!-- Tailwind CSS -->
    <script src="tailwind.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'aviation-teal': '#0F4C5C',
                        'aviation-gold': '#D4AF37',
                        'aviation-light': '#E8F0FE',
                        'aviation-dark': '#0B1E26',
                        'midnight-bg': '#0A1128',
                        'midnight-sec': '#141E3A',
                        'midnight-card': '#1E2A4F',
                    },
                    fontFamily: {
                        'sans': ['Jost', 'system-ui', 'sans-serif'],
                        'display': ['"Cormorant Garamond"', 'serif'],
                        'serif': ['"Cormorant Garamond"', 'serif'],
                        'mono': ['"Fira Code"', 'monospace'],
                    },
                    backgroundImage: {
                        'aviation-pattern': "radial-gradient(circle at 20% 30%, rgba(212,175,55,0.06) 0%, transparent 60%)",
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-6px)' } },
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600;700;800&family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        /* NO SCROLL — fit exactly one screen */
        html,
        body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #E8F0FE;
            color: #0B1E26;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            font-family: 'Jost', sans-serif;
        }

        .dark body {
            background-color: #0A1128;
            color: #E8EDEE;
        }

        /* toggle buttons — positioned top-right */
        .theme-toggle-wrapper {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 1000;
            display: flex;
            gap: 6px;
        }

        .toggle-btn {
            width: 36px;
            height: 36px;
            border-radius: 40px;
            background: rgba(255,255,255,0.9);
            color: #0F4C5C;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(212,175,55,0.2);
            font-size: 0.9rem;
        }
        .dark .toggle-btn { background: rgba(30,42,79,0.8); color: #D4AF37; border-color: rgba(212,175,55,0.15); }
        .toggle-btn:hover { background: #D4AF37; color: #0A1128; transform: rotate(15deg); }
        .dark .toggle-btn:hover { background: #D4AF37; color: #0A1128; }

        /* LOGIN CARD */
        .login-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 36px;
            padding: 2.2rem 2rem 2rem;
            box-shadow: 0 20px 60px rgba(15,76,92,0.15);
            border: 1px solid rgba(212,175,55,0.2);
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
        }

        .dark .login-card {
            background: rgba(15,76,92,0.92);
            border-color: rgba(212,175,55,0.25);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        /* input styling */
        .login-input {
            width: 100%;
            padding: 0.85rem 1.2rem 0.85rem 3rem;
            border-radius: 50px;
            border: 1.5px solid #CFD5DB;
            background: white;
            font-size: 0.95rem;
            transition: all 0.2s;
            color: #0B1E26;
            font-family: 'Jost', sans-serif;
        }

        .dark .login-input {
            background: rgba(10,17,40,0.8);
            border-color: #2E3F6D;
            color: #E8EDEE;
        }

        .login-input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.25);
        }

        .dark .login-input:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.25);
        }

        /* password wrapper */
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper .login-input {
            padding-right: 3rem;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #D4AF37;
            font-size: 1rem;
            transition: color 0.2s;
            background: transparent;
            border: none;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dark .toggle-password {
            color: #D4AF37;
        }

        .toggle-password:hover {
            color: #0F4C5C;
        }
        .dark .toggle-password:hover {
            color: #D4AF37;
        }

        [dir="rtl"] .toggle-password {
            right: auto;
            left: 1rem;
        }

        [dir="rtl"] .password-wrapper .login-input {
            padding-right: 3rem;
            padding-left: 3rem;
        }

        [dir="rtl"] .input-icon {
            left: auto;
            right: 0;
            padding-left: 0;
            padding-right: 1rem;
        }

        /* primary button */
        .edge-btn {
            background: #D4AF37;
            color: #0F4C5C;
            font-weight: 700;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            font-family: 'Jost', sans-serif;
            letter-spacing: 0.02em;
        }

        .edge-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212,175,55,0.4);
            background: #0F4C5C;
            color: #D4AF37;
        }

        .dark .edge-btn {
            background: #D4AF37;
            color: #0F4C5C;
        }

        .dark .edge-btn:hover {
            background: #0F4C5C;
            color: #D4AF37;
        }

        /* social login buttons */
        .social-btn-row {
            display: flex;
            gap: 1rem;
            width: 100%;
        }

        .social-btn {
            flex: 1;
            padding: 0.8rem 0.5rem;
            border-radius: 50px;
            border: 1.5px solid #CFD5DB;
            background: white;
            color: #0B1E26;
            font-weight: 500;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            gap: 0.5rem;
            white-space: nowrap;
            cursor: pointer;
            font-family: 'Jost', sans-serif;
        }

        .dark .social-btn {
            background: rgba(10,17,40,0.6);
            border-color: #2E3F6D;
            color: #E8EDEE;
        }

        .social-btn:hover {
            background: rgba(212,175,55,0.1);
            border-color: #D4AF37;
            transform: translateY(-2px);
        }

        .dark .social-btn:hover {
            background: rgba(212,175,55,0.15);
            border-color: #D4AF37;
        }

        .social-btn i {
            font-size: 1.1rem;
            color: #D4AF37;
        }

        .dark .social-btn i {
            color: #D4AF37;
        }

        /* logo container */
        .logo-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: transparent;
            padding: 0;
            border: none;
            box-shadow: none;
            transform: none;
            transition: none;
            text-decoration: none;
        }

        .logo-icon-box {
            background: #0F4C5C;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(15,76,92,0.3);
            border: 1px solid rgba(212,175,55,0.25);
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .logo-icon-box i {
            color: #D4AF37;
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .logo-wrapper:hover .logo-icon-box i {
            transform: scale(1.1);
        }

        .logo-text-group {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .logo-text .sky {
            color: #0F4C5C;
        }
        .dark .logo-text .sky {
            color: #FFFFFF;
        }
        .logo-text .wings {
            color: #D4AF37;
        }

        .logo-sub {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #94A3B8;
            font-weight: 600;
            margin-top: -1px;
            display: block;
        }
        .dark .logo-sub {
            color: #94A3B8;
        }

        .welcome-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #0F4C5C;
            margin-top: 0.5rem;
            margin-bottom: 0.25rem;
            text-align: center;
            line-height: 1.2;
        }

        .dark .welcome-title {
            color: #E8EDEE;
        }

        .welcome-subtitle {
            font-size: 0.9rem;
            color: #64748B;
            text-align: center;
            margin-bottom: 0.5rem;
            font-family: 'Jost', sans-serif;
        }

        .dark .welcome-subtitle {
            color: #94A3B8;
        }

        /* RTL adjustments */
        [dir="rtl"] .login-input {
            padding: 0.85rem 3rem 0.85rem 1.2rem;
        }

        [dir="rtl"] .fa-arrow-right {
            transform: scaleX(-1);
        }

        [dir="rtl"] .theme-toggle-wrapper {
            right: auto;
            left: 12px;
        }

        /* Fix for short screens */
        @media (max-height: 650px) {
            .login-card {
                padding: 0.8rem 1.5rem;
                transform: scale(0.95);
                transform-origin: center;
            }

            .logo-center {
                margin-bottom: 0.5rem;
            }

            .welcome-title {
                font-size: 1.3rem;
                margin-top: 0;
            }

            .welcome-subtitle {
                font-size: 0.8rem;
                margin-bottom: 0.5rem;
            }

            .login-input {
                padding: 0.6rem 0.8rem 0.6rem 2.5rem;
                font-size: 0.85rem;
            }

            .edge-btn {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
                margin-top: 0.25rem;
            }

            .theme-toggle-wrapper {
                top: 8px;
                right: 8px;
            }

            .toggle-btn {
                width: 32px;
                height: 32px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 380px) {
            .login-card {
                padding: 1.5rem 1.2rem;
                border-radius: 24px;
            }

            .logo-center {
                margin-bottom: 1rem;
            }

            .welcome-title {
                font-size: 1.3rem;
            }

            .login-input {
                padding: 0.7rem 1rem 0.7rem 2.8rem;
                font-size: 0.85rem;
            }

            .edge-btn {
                padding: 0.7rem 1.5rem;
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            .theme-toggle-wrapper {
                top: 12px;
                right: 12px;
            }

            [dir="rtl"] .theme-toggle-wrapper {
                left: 12px;
            }
        }

        .hidden {
            display: none;
        }

        .container-tight {
            max-width: 480px;
            width: 100%;
            padding: 0 1.2rem;
        }

        .text-edge {
            color: #D4AF37;
        }

        a {
            transition: all 0.2s ease;
        }

        /* background pattern */
        .bg-aviation-pattern {
            background-image: radial-gradient(circle at 20% 30%, rgba(212,175,55,0.06) 0%, transparent 60%);
        }
    </style>
</head>

<body class="bg-aviation-pattern">

    <!-- ===== THEME TOGGLES - TOP-RIGHT ===== -->
    <div class="theme-toggle-wrapper flex items-center gap-3">
        <button id="theme-toggle" class="toggle-btn"><i class="fas fa-moon"></i><i class="fas fa-sun hidden"></i></button>
        <button id="rtl-toggle" class="toggle-btn">⇄</button>
    </div>

    <!-- ===== LOGIN CARD ===== -->
    <div class="container-tight">
        <div class="login-card animate-fade-in">

            <!-- ===== LOGO - SAME AS SIGNUP.HTML ===== -->
            <div class="logo-center mb-8">
                <a href="index.html" class="logo-wrapper">
                    <img src="assests/logo.png" alt="Logo" class="w-12 h-12 object-contain">
                    <div class="logo-text-group">
                        <span class="logo-text">
                            <span class="sky">Sky</span><span class="wings">Wings</span>
                        </span>
                        <span class="logo-sub">Aviation Academy</span>
                    </div>
                </a>
                <h1 class="welcome-title">Welcome Back to SkyWings</h1>
                <p class="welcome-subtitle">Log in to continue your pilot training journey</p>
            </div>

            <!-- ===== LOGIN FORM ===== -->
            <form id="loginForm" class="space-y-5" action="#" method="GET">

                <!-- email field -->
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-aviation-gold input-icon">
                        <i class="fas fa-envelope w-5 text-sm"></i>
                    </span>
                    <input type="email" name="email" id="login-email" placeholder="Email address" required
                        class="login-input text-sm md:text-base">
                </div>

                <!-- password field with eye icon -->
                <div class="password-wrapper">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-aviation-gold input-icon">
                        <i class="fas fa-lock w-5 text-sm"></i>
                    </span>
                    <input type="password" id="login-password" name="password" placeholder="Password" required
                        class="login-input text-sm md:text-base">
                    <button type="button" class="toggle-password" data-target="login-password"
                        aria-label="Show password">
                        <i class="far fa-eye-slash"></i>
                    </button>
                </div>

                <!-- remember + forgot -->
                <div class="flex items-center justify-between text-xs md:text-sm">
                    <label class="flex items-center space-x-2 rtl:space-x-reverse cursor-pointer text-gray-700 dark:text-gray-300">
                        <input type="checkbox"
                            class="rounded border-gray-300 dark:border-gray-600 text-aviation-gold focus:ring-aviation-gold/30 dark:bg-gray-700"
                            checked>
                        <span class="ml-1 rtl:mr-1">Remember me</span>
                    </label>
                    <a href="#" id="forgotPasswordLink" dir="ltr"
                        class="text-aviation-gold dark:text-aviation-gold hover:text-aviation-teal font-medium transition hover:underline inline-block">
                        Forgot password?
                    </a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="edge-btn mt-3">
                    Sign In
                </button>

                <!-- divider -->
                <div class="relative my-4">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
                    </div>
                    <div class="relative justify-center flex text-xs">
                        <span class="bg-white dark:bg-[#0F4C5C] px-4 py-0.5 text-gray-500 dark:text-gray-400 rounded-full">
                            or continue with
                        </span>
                    </div>
                </div>

            </form>

            <!-- ===== SOCIAL LOGIN BUTTONS ===== -->
            <div class="mt-6">
                <div class="grid grid-cols-2 gap-3">
                    <button class="social-btn group w-full flex items-center justify-center gap-2 py-3 px-2 text-sm"
                        onclick="socialLogin('google')">
                        <i class="fab fa-google text-base"></i>
                        <span>Google</span>
                    </button>
                    <button class="social-btn group w-full flex items-center justify-center gap-2 py-3 px-2 text-sm"
                        onclick="socialLogin('apple')">
                        <i class="fab fa-apple text-base"></i>
                        <span>Apple</span>
                    </button>
                </div>
            </div>

            <!-- ===== "NOT A MEMBER? SIGN UP" LINK ===== -->
            <div class="text-center mt-6 pt-4 border-t border-dashed border-gray-200 dark:border-gray-700/40" dir="ltr">
                <span class="text-gray-700 dark:text-gray-300 text-sm md:text-base">New to SkyWings?</span>
                <a href="signup.html"
                    class="inline-flex items-center text-aviation-gold dark:text-aviation-gold font-semibold hover:text-aviation-teal transition hover:underline text-sm md:text-base ml-1">
                    Create an account
                    <i class="fas fa-arrow-right ml-2 text-xs"></i>
                </a>
            </div>

        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script>
            (function () {
                // ---------- THEME TOGGLE ----------
                const themeToggle = document.getElementById('theme-toggle');

                function setTheme(isDark) {
                    if (isDark) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }

                    const icon = themeToggle?.querySelector('i');
                    if (icon) {
                        icon.classList.remove('fa-sun', 'fa-moon');
                        icon.classList.add(isDark ? 'fa-moon' : 'fa-sun');
                    }

                    if (isDark) {
                        themeToggle?.classList.add('active');
                        localStorage.setItem('theme', 'dark');
                    } else {
                        themeToggle?.classList.remove('active');
                        localStorage.setItem('theme', 'light');
                    }
                }

                // Check for saved theme or system preference
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark') {
                    setTheme(true);
                } else if (savedTheme === 'light') {
                    setTheme(false);
                } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    setTheme(true);
                } else {
                    setTheme(false);
                }

                if (themeToggle) {
                    themeToggle.addEventListener('click', (e) => {
                        e.preventDefault();
                        setTheme(!document.documentElement.classList.contains('dark'));
                    });
                }

                // ---------- RTL TOGGLE ----------
                const rtlBtn = document.getElementById('rtl-toggle');

                function setRTL(isRTL) {
                    if (isRTL) {
                        document.documentElement.dir = 'rtl';
                        document.documentElement.lang = 'ar';
                        rtlBtn?.classList.add('active');
                        localStorage.setItem('dir', 'rtl');
                    } else {
                        document.documentElement.dir = 'ltr';
                        document.documentElement.lang = 'en';
                        rtlBtn?.classList.remove('active');
                        localStorage.setItem('dir', 'ltr');
                    }
                }
                const savedDir = localStorage.getItem('dir');
                savedDir === 'rtl' ? setRTL(true) : setRTL(false);

                if (rtlBtn) {
                    rtlBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        setRTL(document.documentElement.dir !== 'rtl');
                    });
                }

                // ---------- EYE ICON TOGGLE PASSWORD VISIBILITY ----------
                const toggleButtons = document.querySelectorAll('.toggle-password');
                toggleButtons.forEach(button => {
                    button.addEventListener('click', function (e) {
                        e.preventDefault();
                        const targetId = this.getAttribute('data-target');
                        const passwordInput = document.getElementById(targetId);
                        if (passwordInput) {
                            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                            passwordInput.setAttribute('type', type);
                            const icon = this.querySelector('i');
                            if (icon) {
                                if (type === 'text') {
                                    icon.classList.remove('fa-eye-slash');
                                    icon.classList.add('fa-eye');
                                } else {
                                    icon.classList.remove('fa-eye');
                                    icon.classList.add('fa-eye-slash');
                                }
                            }
                        }
                    });
                });

                // ---------- FORGOT PASSWORD HANDLER ----------
                const forgotLink = document.getElementById('forgotPasswordLink');
                if (forgotLink) {
                    forgotLink.addEventListener('click', (e) => {
                        e.preventDefault();
                        alert('✈️ Password reset link will be sent to your email. Check your inbox!');
                    });
                }

                // ---------- LOGIN FORM SUBMIT ----------
                const loginForm = document.getElementById('loginForm');
                if (loginForm) {
                    loginForm.addEventListener('submit', (e) => {
                        e.preventDefault();

                        const email = document.getElementById('login-email')?.value;
                        const password = document.getElementById('login-password')?.value;

                        if (!email || !password) {
                            alert('Please enter both email and password');
                            return;
                        }

                        // Redirect to dashboard after successful login
                        window.location.href = 'dashboard.html';
                    });
                }

                // ---------- SOCIAL LOGIN HANDLER ----------
                window.socialLogin = function (provider) {
                    alert(`✈️ ${provider.charAt(0).toUpperCase() + provider.slice(1)} login would be implemented here.\n\nWelcome to SkyWings — manage your flight training and pilot dashboard!`);
                };
            })();
    </script>
</body>

</html>
