<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height, viewport-fit=cover">
    <title>Sign Up · SkyWings Aviation Academy</title>
    <!-- Custom Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='75' font-size='75' text-anchor='middle'%3E✈️%3C/text%3E%3C/svg%3E">
    <meta name="description" content="Create your SkyWings Aviation Academy account. Start your pilot training journey, book flight lessons, and track your progress.">

    <!-- Tailwind CSS -->
    <script src="tailwind.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'aviation-teal': '#0F4C5C',
                        'aviation-gold': '#D4AF37',
                        'aviation-light': '#E8F0FE',
                        'aviation-dark': '#0B1E26',
                        'midnight-bg': '#0A1128',
                        'midnight-sec': '#141E3A',
                        'midnight-card': '#1E2A4F',
                    },
                    fontFamily: {
                        'sans': ['Jost', 'system-ui', 'sans-serif'],
                        'display': ['"Cormorant Garamond"', 'serif'],
                        'serif': ['"Cormorant Garamond"', 'serif'],
                        'mono': ['"Fira Code"', 'monospace'],
                    },
                    backgroundImage: {
                        'aviation-pattern': "radial-gradient(circle at 20% 30%, rgba(212,175,55,0.06) 0%, transparent 60%)",
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-6px)' } },
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600;700;800&family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        /* NO SCROLL — fit exactly one screen */
        html,
        body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #E8F0FE;
            color: #0B1E26;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            font-family: 'Jost', sans-serif;
        }

        .dark body {
            background-color: #0A1128;
            color: #E8EDEE;
        }

        /* toggle buttons — positioned top-right */
        .theme-toggle-wrapper {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 1000;
            display: flex;
            gap: 6px;
        }

        .toggle-btn {
            width: 36px;
            height: 36px;
            border-radius: 40px;
            background: rgba(255,255,255,0.9);
            color: #0F4C5C;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(212,175,55,0.2);
            font-size: 0.9rem;
        }
        .dark .toggle-btn { background: rgba(30,42,79,0.8); color: #D4AF37; border-color: rgba(212,175,55,0.15); }
        .toggle-btn:hover { background: #D4AF37; color: #0A1128; transform: rotate(15deg); }
        .dark .toggle-btn:hover { background: #D4AF37; color: #0A1128; }

        /* SIGNUP CARD — responsive padding */
        .signup-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 36px;
            padding: 2.2rem 2rem 2rem;
            box-shadow: 0 20px 60px rgba(15,76,92,0.15);
            border: 1px solid rgba(212,175,55,0.2);
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            transition: all 0.3s ease;
        }

        .dark .signup-card {
            background: rgba(15,76,92,0.92);
            border-color: rgba(212,175,55,0.25);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        /* input styling */
        .signup-input {
            width: 100%;
            padding: 0.85rem 1.2rem 0.85rem 3rem;
            border-radius: 50px;
            border: 1.5px solid #CFD5DB;
            background: white;
            font-size: 0.95rem;
            transition: all 0.2s;
            color: #0B1E26;
            font-family: 'Jost', sans-serif;
        }

        .dark .signup-input {
            background: rgba(10,17,40,0.8);
            border-color: #2E3F6D;
            color: #E8EDEE;
        }

        .signup-input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.25);
        }

        .dark .signup-input:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.25);
        }

        /* password wrapper for eye icon */
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper .signup-input {
            padding-right: 2.8rem;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #D4AF37;
            font-size: 0.9rem;
            transition: color 0.2s;
            background: transparent;
            border: none;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dark .toggle-password {
            color: #D4AF37;
        }

        .toggle-password:hover {
            color: #0F4C5C;
        }
        .dark .toggle-password:hover {
            color: #D4AF37;
        }

        [dir="rtl"] .toggle-password {
            right: auto;
            left: 1rem;
        }

        [dir="rtl"] .password-wrapper .signup-input {
            padding-right: 2.8rem;
            padding-left: 2.8rem;
        }

        [dir="rtl"] .input-icon {
            left: auto;
            right: 0;
            padding-left: 0;
            padding-right: 1rem;
        }

        /* primary button */
        .edge-btn {
            background: #D4AF37;
            color: #0F4C5C;
            font-weight: 700;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            font-family: 'Jost', sans-serif;
            letter-spacing: 0.02em;
        }

        .edge-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212,175,55,0.4);
            background: #0F4C5C;
            color: #D4AF37;
        }

        .dark .edge-btn {
            background: #D4AF37;
            color: #0F4C5C;
        }

        .dark .edge-btn:hover {
            background: #0F4C5C;
            color: #D4AF37;
        }

        /* social login buttons */
        .social-btn-row {
            display: flex;
            gap: 1rem;
            width: 100%;
        }

        .social-btn {
            flex: 1;
            padding: 0.8rem 0.5rem;
            border-radius: 50px;
            border: 1.5px solid #CFD5DB;
            background: white;
            color: #0B1E26;
            font-weight: 500;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            gap: 0.5rem;
            white-space: nowrap;
            cursor: pointer;
            font-family: 'Jost', sans-serif;
        }

        .dark .social-btn {
            background: rgba(10,17,40,0.6);
            border-color: #2E3F6D;
            color: #E8EDEE;
        }

        .social-btn:hover {
            background: rgba(212,175,55,0.1);
            border-color: #D4AF37;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        .dark .social-btn:hover {
            background: rgba(212,175,55,0.15);
            border-color: #D4AF37;
        }

        .social-btn i {
            font-size: 1.1rem;
            color: #D4AF37;
        }

        .dark .social-btn i {
            color: #D4AF37;
        }

        /* RTL adjustments */
        [dir="rtl"] .signup-input {
            padding: 0.75rem 2.8rem 0.75rem 1rem;
        }

        [dir="rtl"] .fa-arrow-right {
            transform: scaleX(-1);
        }

        [dir="rtl"] .theme-toggle-wrapper {
            right: auto;
            left: 12px;
        }

        [dir="rtl"] .flex.space-x-2> :not([hidden])~ :not([hidden]) {
            margin-right: 0.5rem;
            margin-left: 0;
        }

        /* hidden utility */
        .hidden {
            display: none;
        }

        /* container */
        .container-tight {
            max-width: 480px;
            width: 100%;
            padding: 0 1rem;
        }

        /* ===== LOGO - SAME AS INDEX.HTML (FIXED VISIBILITY) ===== */
        .logo-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.75rem;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: transparent;
            padding: 0;
            border: none;
            box-shadow: none;
            transform: none;
            transition: none;
            text-decoration: none;
        }

        .logo-icon-box {
            background: #0F4C5C;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(15,76,92,0.3);
            border: 1px solid rgba(212,175,55,0.25);
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .logo-icon-box i {
            color: #D4AF37;
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .logo-wrapper:hover .logo-icon-box i {
            transform: scale(1.1);
        }

        .logo-text-group {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .logo-text .sky {
            color: #0F4C5C;
        }
        .dark .logo-text .sky {
            color: #FFFFFF;
        }
        .logo-text .wings {
            color: #D4AF37;
        }

        .logo-sub {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #94A3B8;
            font-weight: 600;
            margin-top: -1px;
            display: block;
        }
        .dark .logo-sub {
            color: #94A3B8;
        }

        /* welcome title styles */
        .welcome-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #0F4C5C;
            margin-top: 0.5rem;
            margin-bottom: 0.05rem;
            text-align: center;
            line-height: 1.2;
        }

        .dark .welcome-title {
            color: #E8EDEE;
        }

        .welcome-subtitle {
            font-size: 0.8rem;
            color: #64748B;
            text-align: center;
            margin-bottom: 0.3rem;
            font-family: 'Jost', sans-serif;
        }

        .dark .welcome-subtitle {
            color: #94A3B8;
        }

        /* terms text style */
        .terms-text {
            font-size: 0.7rem;
            color: #64748B;
            line-height: 1.4;
        }

        .dark .terms-text {
            color: #94A3B8;
        }

        .terms-link {
            color: #D4AF37;
            font-weight: 500;
            text-decoration: none;
        }

        .terms-link:hover {
            text-decoration: underline;
            color: #0F4C5C;
        }

        .dark .terms-link {
            color: #D4AF37;
        }

        .dark .terms-link:hover {
            color: #D4AF37;
        }

        /* divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 0.8rem 0 0.6rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #CFD5DB;
        }

        .dark .divider::before,
        .dark .divider::after {
            border-bottom-color: #4A4A4A;
        }

        .divider span {
            font-size: 0.7rem;
            padding: 0 0.8rem;
            color: #64748B;
            font-weight: 500;
        }

        .dark .divider span {
            color: #94A3B8;
        }

        .space-y-3> :not([hidden])~ :not([hidden]) {
            margin-top: 0.6rem;
        }

        /* ===== IPHONE 12 PRO & SIMILAR (390x844) ===== */
        @media (max-width: 430px) {
            .container-tight {
                padding: 0 0.75rem;
            }

            .signup-card {
                padding: 1.25rem 1.2rem;
                border-radius: 28px;
                max-width: 100%;
            }

            .logo-center {
                margin-bottom: 0.3rem;
            }

            .logo-icon-box {
                width: 40px;
                height: 40px;
                border-radius: 10px;
            }

            .logo-icon-box i {
                font-size: 1.2rem;
            }

            .logo-text {
                font-size: 1.25rem;
            }

            .logo-sub {
                font-size: 0.5rem;
                letter-spacing: 0.15em;
            }

            .welcome-title {
                font-size: 1.25rem;
                margin-top: 0.25rem;
            }

            .welcome-subtitle {
                font-size: 0.7rem;
                margin-bottom: 0.2rem;
            }

            .signup-input {
                padding: 0.6rem 0.8rem 0.6rem 2.4rem;
                font-size: 0.8rem;
                border-radius: 40px;
            }

            .password-wrapper .signup-input {
                padding-right: 2.4rem;
            }

            .toggle-password {
                right: 0.7rem;
                font-size: 0.8rem;
            }

            [dir="rtl"] .signup-input {
                padding: 0.6rem 2.4rem 0.6rem 0.8rem;
            }

            [dir="rtl"] .password-wrapper .signup-input {
                padding-right: 2.4rem;
                padding-left: 2.4rem;
            }

            .input-icon {
                font-size: 0.75rem;
            }

            .edge-btn {
                padding: 0.6rem 1rem;
                font-size: 0.8rem;
                border-radius: 40px;
            }

            .social-btn-row {
                gap: 0.5rem;
            }

            .social-btn {
                padding: 0.5rem 0.3rem;
                font-size: 0.7rem;
                border-radius: 40px;
                gap: 0.3rem;
            }

            .social-btn i {
                font-size: 0.85rem;
            }

            .divider {
                margin: 0.6rem 0 0.4rem;
            }

            .divider span {
                font-size: 0.65rem;
                padding: 0 0.6rem;
            }

            .terms-text {
                font-size: 0.65rem;
            }

            .theme-toggle-wrapper {
                top: 8px;
                right: 8px;
                gap: 4px;
            }

            .toggle-btn {
                width: 30px;
                height: 30px;
                font-size: 0.75rem;
            }

            .space-y-3> :not([hidden])~ :not([hidden]) {
                margin-top: 0.5rem;
            }

            .mt-4 {
                margin-top: 0.6rem;
            }

            .mt-2 {
                margin-top: 0.3rem;
            }

            .mt-1 {
                margin-top: 0.2rem;
            }

            .mb-6 {
                margin-bottom: 0.3rem;
            }

            .floating-aviation {
                font-size: 50px;
                bottom: 10px;
                left: 10px;
            }
        }

        /* Extra small phones */
        @media (max-width: 360px) {
            .signup-card {
                padding: 1rem 0.8rem;
                border-radius: 24px;
            }

            .logo-icon-box {
                width: 34px;
                height: 34px;
            }

            .logo-icon-box i {
                font-size: 1rem;
            }

            .logo-text {
                font-size: 1.1rem;
            }

            .logo-sub {
                font-size: 0.45rem;
                letter-spacing: 0.12em;
            }

            .welcome-title {
                font-size: 1.1rem;
            }

            .welcome-subtitle {
                font-size: 0.65rem;
            }

            .signup-input {
                padding: 0.5rem 0.6rem 0.5rem 2rem;
                font-size: 0.75rem;
            }

            .password-wrapper .signup-input {
                padding-right: 2rem;
            }

            .toggle-password {
                right: 0.5rem;
                font-size: 0.7rem;
            }

            .edge-btn {
                padding: 0.5rem 0.8rem;
                font-size: 0.75rem;
            }

            .social-btn {
                font-size: 0.65rem;
                padding: 0.4rem 0.2rem;
            }

            .social-btn i {
                font-size: 0.75rem;
            }

            .terms-text {
                font-size: 0.6rem;
            }

            .toggle-btn {
                width: 28px;
                height: 28px;
                font-size: 0.7rem;
            }

            .theme-toggle-wrapper {
                top: 6px;
                right: 6px;
                gap: 3px;
            }
        }

        /* Short screens (like iPhone 12 Pro in landscape or small height) */
        @media (max-height: 750px) {
            .signup-card {
                padding: 0.8rem 1.2rem;
                border-radius: 24px;
                transform: scale(0.95);
                transform-origin: center;
            }

            .logo-center {
                margin-bottom: 0.2rem;
            }

            .logo-icon-box {
                width: 34px;
                height: 34px;
            }

            .logo-icon-box i {
                font-size: 1rem;
            }

            .logo-text {
                font-size: 1.1rem;
            }

            .logo-sub {
                font-size: 0.45rem;
                letter-spacing: 0.12em;
            }

            .welcome-title {
                font-size: 1.1rem;
                margin-top: 0.1rem;
            }

            .welcome-subtitle {
                font-size: 0.65rem;
                margin-bottom: 0.1rem;
            }

            .signup-input {
                padding: 0.5rem 0.6rem 0.5rem 2rem;
                font-size: 0.75rem;
            }

            .password-wrapper .signup-input {
                padding-right: 2rem;
            }

            .edge-btn {
                padding: 0.4rem 0.8rem;

            }

            .space-y-3> :not([hidden])~ :not([hidden]) {
                margin-top: 0.3rem;
            }

                top: 6px;
                right: 6px;

            .mt-4 {

        .floating-aviation {

<body class="aviation-pattern">

    <!-- ===== THEME TOGGLES - TOP-RIGHT ===== -->
    <div class="theme-toggle-wrapper flex items-center gap-3">
        <button id="theme-toggle" class="toggle-btn"><i class="fas fa-moon"></i><i class="fas fa-sun hidden"></i></button>
        <button id="rtl-toggle" class="toggle-btn">⇄</button>
    </div>

    <!-- ===== SIGNUP CARD ===== -->
    <div class="container-tight">
        <div class="signup-card">

            <!-- ===== LOGO - SAME AS INDEX.HTML (FIXED VISIBILITY) ===== -->
            <div class="logo-center mb-6">
                <a href="index.html" class="logo-wrapper">
                    <img src="assests/logo.png" alt="Logo" class="w-12 h-12 object-contain">
                    <div class="logo-text-group">
                        <span class="logo-text">
                            <span class="sky">Sky</span><span class="wings">Wings</span>
                        </span>
                        <span class="logo-sub">Aviation Academy</span>
                    </div>
                </a>

                <h1 class="welcome-title">Join the SkyWings Community</h1>
                <p class="welcome-subtitle">Create an account to start your pilot training journey</p>
            </div>

            <!-- ===== SIGNUP FORM with EYE ICON on password fields ===== -->
            <form id="signupForm" class="space-y-3" action="#" method="GET">

                <!-- full name field -->
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-aviation-gold input-icon">
                        <i class="fas fa-user w-4 text-sm"></i>
                    </span>
                    <input type="text" id="fullName" name="name" placeholder="Full name" required
                        class="signup-input text-sm md:text-sm">
                </div>

                <!-- email field -->
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-aviation-gold input-icon">
                        <i class="fas fa-envelope w-4 text-sm"></i>
                    </span>
                    <input type="email" id="email" name="email" placeholder="Email address" required
                        class="signup-input text-sm md:text-sm">
                </div>

                <!-- password field with eye icon -->
                <div class="password-wrapper">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-aviation-gold input-icon">
                        <i class="fas fa-lock w-4 text-sm"></i>
                    </span>
                    <input type="password" id="signup-password" name="password" placeholder="Password" required
                        class="signup-input text-sm md:text-sm">
                    <button type="button" class="toggle-password" data-target="signup-password"
                        aria-label="Show password">
                        <i class="far fa-eye-slash"></i>
                    </button>
                </div>

                <!-- confirm password field with eye icon -->
                <div class="password-wrapper">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-aviation-gold input-icon">
                        <i class="fas fa-lock w-4 text-sm"></i>
                    </span>
                    <input type="password" id="signup-confirm-password" name="confirm_password"
                        placeholder="Confirm password" required class="signup-input text-sm md:text-sm">
                    <button type="button" class="toggle-password" data-target="signup-confirm-password"
                        aria-label="Show password">
                        <i class="far fa-eye-slash"></i>
                    </button>
                </div>

                <!-- terms and conditions checkbox -->
                <div class="flex items-start space-x-2 rtl:space-x-reverse mt-1">
                    <input type="checkbox" id="terms"
                        class="mt-0.5 rounded border-gray-300 dark:border-gray-600 text-aviation-gold focus:ring-aviation-gold/30 dark:bg-gray-700"
                        required>
                    <label for="terms" class="terms-text">
                        I agree to the <a href="#" class="terms-link" id="termsLink">Terms of Service</a> and <a
                            href="#" class="terms-link" id="privacyLink">Privacy Policy</a>
                    </label>
                </div>

                <!-- SIGN UP BUTTON -->
                <button type="submit" class="edge-btn mt-2">
                    Create Account <i class="fas fa-arrow-right ml-2 text-xs"></i>
                </button>
            </form>

            <!-- ===== Divider + Social Options (Google & Apple) ===== -->
            <div class="divider">
                <span>or sign up with</span>
            </div>

            <div class="social-btn-row">
                <button class="social-btn group" id="googleSignupBtn">
                    <i class="fab fa-google"></i>
                    <span>Google</span>
                </button>
                <button class="social-btn group" id="appleSignupBtn">
                    <i class="fab fa-apple"></i>
                    <span>Apple</span>
                </button>
            </div>

            <!-- ===== LOGIN LINK ===== -->
            <div class="mt-4 text-center" dir="ltr">
                <span class="text-xs text-gray-600 dark:text-gray-400">Already have an account?</span>
                <a href="login.html"
                    class="text-xs font-semibold text-aviation-gold dark:text-aviation-gold hover:text-aviation-teal ml-1 rtl:mr-1 hover:underline">
                    Sign in
                </a>
            </div>

        </div>
    </div>

    <!-- Floating decoration -->
    <div class="floating-aviation">
        <i class="fas fa-plane"></i>
    </div>

    <!-- ===== DARK / LIGHT + RTL TOGGLE SCRIPT + EYE ICON FUNCTIONALITY ===== -->
    <script>
            (function () {
                // ---------- THEME ----------
                const themeToggle = document.getElementById('theme-toggle');

                function setTheme(isDark) {
                    if (isDark) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }

                    const icon = themeToggle?.querySelector('i');
                    if (icon) {
                        icon.classList.remove('fa-sun', 'fa-moon');
                        icon.classList.add(isDark ? 'fa-moon' : 'fa-sun');
                    }

                    if (isDark) {
                        themeToggle?.classList.add('active');
                        localStorage.setItem('theme', 'dark');
                    } else {
                        themeToggle?.classList.remove('active');
                        localStorage.setItem('theme', 'light');
                    }
                }

                // Check for saved theme or system preference
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark') {
                    setTheme(true);
                } else if (savedTheme === 'light') {
                    setTheme(false);
                } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    setTheme(true);
                } else {
                    setTheme(false);
                }

                if (themeToggle) {
                    themeToggle.addEventListener('click', (e) => {
                        e.preventDefault();
                        setTheme(!document.documentElement.classList.contains('dark'));
                    });
                }

                // ---------- RTL ----------
                const rtlBtn = document.getElementById('rtl-toggle');
                function setRTL(isRTL) {
                    if (isRTL) {
                        document.documentElement.dir = 'rtl';
                        document.documentElement.lang = 'ar';
                        rtlBtn?.classList.add('active');
                        localStorage.setItem('dir', 'rtl');
                    } else {
                        document.documentElement.dir = 'ltr';
                        document.documentElement.lang = 'en';
                        rtlBtn?.classList.remove('active');
                        localStorage.setItem('dir', 'ltr');
                    }
                }
                const savedDir = localStorage.getItem('dir');
                savedDir === 'rtl' ? setRTL(true) : setRTL(false);

                if (rtlBtn) {
                    rtlBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        setRTL(document.documentElement.dir !== 'rtl');
                    });
                }

                // ---------- EYE ICON TOGGLE PASSWORD VISIBILITY ----------
                const toggleButtons = document.querySelectorAll('.toggle-password');
                toggleButtons.forEach(button => {
                    button.addEventListener('click', function (e) {
                        e.preventDefault();
                        const targetId = this.getAttribute('data-target');
                        const passwordInput = document.getElementById(targetId);
                        if (passwordInput) {
                            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                            passwordInput.setAttribute('type', type);
                            const icon = this.querySelector('i');
                            if (icon) {
                                if (type === 'text') {
                                    icon.classList.remove('fa-eye-slash');
                                    icon.classList.add('fa-eye');
                                } else {
                                    icon.classList.remove('fa-eye');
                                    icon.classList.add('fa-eye-slash');
                                }
                            }
                        }
                    });
                });

                // ---------- SOCIAL BUTTONS (Google & Apple) interactive demo ----------
                const googleBtn = document.getElementById('googleSignupBtn');
                const appleBtn = document.getElementById('appleSignupBtn');

                if (googleBtn) {
                    googleBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        alert('✈️ Google sign-up would be implemented here.\n\nWelcome to SkyWings Aviation Academy!');
                    });
                }
                if (appleBtn) {
                    appleBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        alert('✈️ Apple sign-up would be implemented here.\n\nWelcome to SkyWings Aviation Academy!');
                    });
                }

                // ---------- TERMS & PRIVACY LINKS ----------
                const termsLink = document.getElementById('termsLink');
                const privacyLink = document.getElementById('privacyLink');

                if (termsLink) {
                    termsLink.addEventListener('click', (e) => {
                        e.preventDefault();
                        alert('📜 SkyWings Terms of Service would be displayed here.');
                    });
                }
                if (privacyLink) {
                    privacyLink.addEventListener('click', (e) => {
                        e.preventDefault();
                        alert('🔒 SkyWings Privacy Policy would be displayed here.');
                    });
                }

                // ---------- PASSWORD MATCH + FORM SUBMIT ----------
                const signupForm = document.getElementById('signupForm');

                if (signupForm) {
                    signupForm.addEventListener('submit', function (e) {
                        e.preventDefault();

                        const password = document.getElementById('signup-password')?.value;
                        const confirm = document.getElementById('signup-confirm-password')?.value;
                        const termsCheck = document.getElementById('terms');
                        const fullName = document.getElementById('fullName')?.value;
                        const email = document.getElementById('email')?.value;

                        if (!fullName || !email) {
                            alert('✈️ Please enter your name and email address to create an account.');
                            return false;
                        }

                        if (password !== confirm) {
                            alert('⚠️ Passwords do not match. Please re-enter your password.');
                            return false;
                        }

                        if (password && password.length < 6) {
                            alert('🔐 Password must be at least 6 characters long.');
                            return false;
                        }

                        if (!termsCheck.checked) {
                            alert('📜 Please accept the Terms of Service and Privacy Policy to continue.');
                            return false;
                        }

                        // Redirect to login page after successful signup
                        window.location.href = 'login.html';

                        return true;
                    });
                }
            })();
    </script>
</body>

</html>
